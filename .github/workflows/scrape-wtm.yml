name: Scrape WherestheMatch (WTM) -> HTML

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYYMMDD)"
        required: true
        default: "20260222"
      end:
        description: "End date (YYYYMMDD)"
        required: true
        default: "20260301"
  schedule:
    - cron: "10 1 * * *" # harian pukul 01:10 UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Mengambil seluruh riwayat agar pull/rebase lancar

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache dinonaktifkan sementara untuk menghindari error 'lock file not found' 
          # sampai file package-lock.json Anda stabil di root

      - name: Install deps
        run: npm install 

      - name: Determine date range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "start=${{ inputs.start }}" >> $GITHUB_OUTPUT
            echo "end=${{ inputs.end }}" >> $GITHUB_OUTPUT
          else
            start=$(date -u +"%Y%m%d")
            end=$(date -u -d "+7 days" +"%Y%m%d")
            echo "start=$start" >> $GITHUB_OUTPUT
            echo "end=$end" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        run: node src/scrape-wtm.js ${{ steps.range.outputs.start }} ${{ steps.range.outputs.end }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Tambahkan semua perubahan ke area 'stage' terlebih dahulu
          git add out/*.html results.csv package.json package-lock.json || true
          
          # 2. Lakukan commit lokal sebelum menarik perubahan dari server
          git commit -m "wtm: update ${{ steps.range.outputs.start }}-${{ steps.range.outputs.end }}" || echo "no changes"
          
          # 3. Tarik perubahan terbaru dari server dengan rebase
          # Strategi ini menggabungkan commit lokal Anda di atas perubahan server
          git pull --rebase origin main
          
          # 4. Push ke repositori utama
          git push origin main
