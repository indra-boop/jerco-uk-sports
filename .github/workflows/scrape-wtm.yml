name: Scrape WTM (daily list)

on:
  schedule:
    - cron: "5 0 * * *"   # tiap hari 00:05 UTC (sesuaikan)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Build date list (next 7 days, WITA)
        id: dates
        run: |
          node - <<'NODE'
          function pad(n){return String(n).padStart(2,'0')}
          function ymd(d){return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`}

          // timezone WITA trick: ambil "tanggal lokal" via Intl
          const tz = "Asia/Makassar";
          const now = new Date();
          const parts = new Intl.DateTimeFormat("en-CA", { timeZone: tz, year:"numeric", month:"2-digit", day:"2-digit"}).formatToParts(now);
          const y = +parts.find(p=>p.type==="year").value;
          const m = +parts.find(p=>p.type==="month").value;
          const da = +parts.find(p=>p.type==="day").value;
          const base = new Date(y, m-1, da);

          const out = [];
          for (let i=1; i<=7; i++){
            const d = new Date(base);
            d.setDate(d.getDate()+i);
            out.push(ymd(d));
          }
          console.log(out.join(" "));
          NODE

      - name: Run scraper (list only)
        run: |
          DATES="$(node - <<'NODE'
          function pad(n){return String(n).padStart(2,'0')}
          function ymd(d){return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`}
          const tz="Asia/Makassar";
          const now=new Date();
          const parts=new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(now);
          const y=+parts.find(p=>p.type==="year").value;
          const m=+parts.find(p=>p.type==="month").value;
          const da=+parts.find(p=>p.type==="day").value;
          const base=new Date(y,m-1,da);
          const out=[];
          for(let i=1;i<=7;i++){const d=new Date(base); d.setDate(d.getDate()+i); out.push(ymd(d));}
          console.log(out.join(" "));
          NODE)"
          echo "DATES=$DATES"
          node src/scrape-wtm.js $DATES

      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add results.csv out || true
          git commit -m "Update WTM results" || echo "No changes"
          git push
