steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Mengaktifkan cache agar proses lebih cepat

      - name: Install deps
        # Mengganti 'npm ci' menjadi 'npm install' agar lockfile diperbarui otomatis
        run: npm install 

      - name: Determine date range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "start=${{ inputs.start }}" >> $GITHUB_OUTPUT
            echo "end=${{ inputs.end }}" >> $GITHUB_OUTPUT
          else
            start=$(date -u +"%Y%m%d")
            end=$(date -u -d "+7 days" +"%Y%m%d")
            echo "start=$start" >> $GITHUB_OUTPUT
            echo "end=$end" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        run: node src/scrape-wtm.js ${{ steps.range.outputs.start }} ${{ steps.range.outputs.end }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Menambahkan package.json dan package-lock.json agar tersinkronisasi di repo
          git add out/*.html results.csv package.json package-lock.json || true
          git commit -m "wtm: update ${{ steps.range.outputs.start }}-${{ steps.range.outputs.end }}" || echo "no changes"
          git push
